name: aerolink-prod

services:
  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - aerolink-prod

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
      args:
        PRISMA_SCHEMA_PATH: prisma/schema.sqlite.prisma
    environment:
      PORT: 3000
      NODE_ENV: production
      CLIENT_URL: ${PUBLIC_ORIGIN:?PUBLIC_ORIGIN is required}
      DATABASE_URL: file:./prisma/data/prod.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      # Legacy SQLite compatibility intentionally uses the profile-specific
      # knobs so a PostgreSQL .env cannot silently switch this service to migrate.
      SCHEMA_MIGRATION_MODE: ${SQLITE_SCHEMA_MIGRATION_MODE:-push}
      ALLOW_DB_PUSH: ${SQLITE_ALLOW_DB_PUSH:-true}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      DEMO_SEED_PASSWORD: ${DEMO_SEED_PASSWORD:-}
      ALLOW_PRODUCTION_DEMO_SEED: ${ALLOW_PRODUCTION_DEMO_SEED:-false}
      REQUIRE_ACTIVE_ADMIN: ${REQUIRE_ACTIVE_ADMIN:-true}
      REQUIRE_SECURE_ORIGIN: ${REQUIRE_SECURE_ORIGIN:-true}
      PRISMA_SCHEMA_PATH: prisma/schema.sqlite.prisma
    secrets:
      - encryption_key
    volumes:
      - backend-data:/app/prisma/data
      - backend-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - aerolink-prod

volumes:
  backend-data:
  backend-uploads:

secrets:
  encryption_key:
    file: ./secrets/encryption_key.txt

networks:
  aerolink-prod:
    driver: bridge
