name: aerolink-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aerolink
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: aerolink
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerolink -d aerolink"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aerolink-prod

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - aerolink-prod

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
      args:
        PRISMA_SCHEMA_PATH: prisma/schema.prisma
    environment:
      PORT: 3000
      NODE_ENV: production
      CLIENT_URL: ${PUBLIC_ORIGIN:?PUBLIC_ORIGIN is required}
      DATABASE_URL: postgresql://aerolink:${DB_PASSWORD}@postgres:5432/aerolink?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      SCHEMA_MIGRATION_MODE: ${SCHEMA_MIGRATION_MODE:-migrate}
      MIGRATION_BASELINE_CONFIRMED: ${MIGRATION_BASELINE_CONFIRMED:-false}
      ALLOW_DB_PUSH: ${ALLOW_DB_PUSH:-false}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      DEMO_SEED_PASSWORD: ${DEMO_SEED_PASSWORD:-}
      ALLOW_PRODUCTION_DEMO_SEED: ${ALLOW_PRODUCTION_DEMO_SEED:-false}
      REQUIRE_ACTIVE_ADMIN: ${REQUIRE_ACTIVE_ADMIN:-true}
      REQUIRE_SECURE_ORIGIN: ${REQUIRE_SECURE_ORIGIN:-true}
      PRISMA_SCHEMA_PATH: prisma/schema.prisma
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - encryption_key
    volumes:
      - backend-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - aerolink-prod

volumes:
  postgres-data:
  backend-uploads:

secrets:
  encryption_key:
    file: ./secrets/encryption_key.txt

networks:
  aerolink-prod:
    driver: bridge
