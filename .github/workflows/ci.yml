name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository history and working tree
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --registry=https://registry.npmjs.org

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run backend tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate observability retention contract
        run: npm run observability:retention-check

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --registry=https://registry.npmjs.org

      - name: Validate OpenAPI contract and generated types
        run: npm run api:check

      - name: Validate feature boundaries
        run: npm run features:check

      - name: Validate server module boundaries
        run: npm run modules:check

      - name: Run frontend unit tests
        run: npx vitest run

      - name: Build frontend
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://aerolink:ci-password@127.0.0.1:5432/aerolink?schema=public
      JWT_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CLIENT_URL: http://127.0.0.1:5173
      VITE_API_URL: http://127.0.0.1:3000/api
      DEMO_SEED_PASSWORD: ci-demo-password-2026
      E2E_PASSWORD: ci-demo-password-2026
      # Controlled fixture only: production defaults to disabled.
      FEATURE_AGENT_DEMO: 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aerolink
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: aerolink
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aerolink -d aerolink"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: Prepare isolated E2E database
        working-directory: ./server
        run: npx prisma migrate deploy --schema prisma/schema.prisma && npm run db:seed

      - name: Run PostgreSQL reconciliation gates
        working-directory: ./server
        run: >-
          npm run db:check:inventory-reconciliation &&
          npm run db:check:money-reconciliation &&
          npm run db:check:json-configuration-reconciliation &&
          npm run db:check:transaction-status-reconciliation

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run navigation regression E2E
        run: npm run test:e2e:navigation-regression
        env:
          CI: true

      - name: Run quotation and contract regression E2E
        run: npm run test:e2e:quotation-contract-regression
        env:
          CI: true

      - name: Run full E2E tests
        run: npm run test:e2e
        env:
          CI: true
