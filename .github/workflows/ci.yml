name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run backend tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npx vitest run

      - name: Build frontend
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Start backend
        working-directory: ./server
        run: npm start &
        env:
          NODE_ENV: test
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret

      - name: Wait for backend
        run: npx wait-on http://localhost:3000/health --timeout 30000 || true

      - name: Run navigation regression E2E
        run: npm run test:e2e:navigation-regression
        env:
          CI: true

      - name: Run quotation and contract regression E2E
        run: npm run test:e2e:quotation-contract-regression
        env:
          CI: true

      - name: Run full E2E tests
        run: npm run test:e2e
        env:
          CI: true
